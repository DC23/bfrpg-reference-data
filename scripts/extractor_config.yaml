# extractor_config.yaml
# Configuration overrides for the BFRPG extraction scripts.

# Entries listed here are multi-entity tables that should be split into
# individual entity files rather than kept as a single multi-variant entry.
split_tables:
  - entry: "Beasts of Burden"
    reason: "Editorial grouping of unrelated creatures; each beast is an independent entry"

# Bold hints in description paragraphs that are in-text mentions, not separate
# item names. These are excluded from item-name matching during description
# enrichment.
ignore_description_hints:
  - "flint and steel"   # mentioned within the Tinderbox description; not a separate item
  - "Bolt Case"         # mentioned within the Quiver description; not a separate item

# Items whose description appears in a section other than "Explanation of Equipment"
# The extractor stores these without a description field; a separate pass or
# manual curation is needed to source the description. 
# For now, we can simply hard-code the description text here. 
# Entries with description_text supply the override text applied by the enricher.
remote_descriptions:
  - name: "Holy Water"
    description_section: "Encounter"
    reason: "description is in Part 5, not in Explanation of Equipment"
    description_text: "Holy water is harmful to undead creatures. A character may throw a flask of holy water as a grenade-like missile, which will break and release the contents if thrown against the body of a corporeal creature. To use it against an incorporeal creature it must be opened and poured or splashed onto the target, generally requiring the attacker to be directly adjacent to it.\n\nEach flask of holy water can inflict 1d8 points of damage to such a monster. In addition, each additional undead monster within 5 feet of the point of impact receives 1d6 points of damage from the splash. Holy water is only effective for one round."
  - name: "Oil (per flask)"
    description_section: "Encounter"
    reason: "description is in Part 5, not in Explanation of Equipment"
    description_text: "A flask of oil can be used as a grenade-like missile. The oil must be set afire in order to inflict damage; otherwise the oil is just slippery. Assuming some means of igniting the oil is at hand, a direct hit to a creature deals 1d8 points of fire damage, plus in the next round the target takes an additional 1d8 points of damage, unless they spend the round extinguishing the flames by some reasonable means. The GM must judge the method used; rolling on the floor (assuming it's not oily also) or covering the flames with a wet blanket are good methods, for instance, while pouring or splashing water on burning oil does little good. In any event, a flask of burning oil only causes damage for two rounds at most. \n\nIf the oil is ignited by some sort of wick or fuse, then all other creatures within 5 feet of the point of impact receive 1d6 points of fire damage from the splash. A save vs. Death Ray is allowed to avoid this damage. If the flask does not hit the intended target (as described under Grenade-Like Missiles, above), then that creature may still take damage from the splash, and receives a saving throw. No saving throw is allowed for a creature which has received a direct hit. \n\nA flask of oil spilled or splattered on the ground will burn for 10 rounds. Those attempting to cross the burning oil will receive 1d6 points of fire damage each round they are in it (with no saving throw in this case). \n\nFire-resistant creatures, including creatures having fire- based abilities, are not damaged by burning oil."
