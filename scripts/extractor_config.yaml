# extractor_config.yaml
# Configuration overrides for the BFRPG extraction scripts.

# Entries listed here are multi-entity tables that should be split into
# individual entity files rather than kept as a single multi-variant entry.
split_tables:
  - entry: "Beasts of Burden"
    reason: "Editorial grouping of unrelated creatures; each beast is an independent entry"

# Bold hints in description paragraphs that are in-text mentions, not separate
# item names. These are excluded from item-name matching during description
# enrichment.
ignore_description_hints:
  - "flint and steel"   # mentioned within the Tinderbox description; not a separate item

# Items whose description appears in a section other than "Explanation of Equipment"
# The extractor stores these without a description field; a separate pass or
# manual curation is needed to source the description. 
# For now, we can simply hard-code the description text here. 
# Entries with description_text supply the override text applied by the enricher.
remote_descriptions:
  - name: "Holy Water"
    description_section: "Encounter"
    reason: "description is in Part 5, not in Explanation of Equipment"
    description_text: "Holy water is harmful to undead creatures. A character may throw a flask of holy water as a grenade-like missile, which will break and release the contents if thrown against the body of a corporeal creature. To use it against an incorporeal creature it must be opened and poured or splashed onto the target, generally requiring the attacker to be directly adjacent to it.\n\nEach flask of holy water can inflict 1d8 points of damage to such a monster. In addition, each additional undead monster within 5 feet of the point of impact receives 1d6 points of damage from the splash. Holy water is only effective for one round."
