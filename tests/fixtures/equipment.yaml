# Normal numeric weight
- name: Bit and bridle
  price: "15 sp"
  weight: "3"

- name: Iron Spikes, 12
  price: "1 gp"
  weight: "1"
  description:
    - "Iron Spikes are useful for spiking doors closed (or spiking them open) and may be used as crude pitons in appropriate situations."

- name: Rope, Hemp (per 50 ft.)
  price: "1 gp"
  weight: "5"
  description:
    - "Hemp Rope is ½ inch in diameter and has a breaking strength of 1,600 pounds. Safe working load for a rope is normally one-quarter of the breaking strength. One or more knots in a rope cut the breaking strength in half. This does not affect the safe working load, because knots are figured into the listed one-quarter ratio."

# Fractional weight (Unicode ½, not "0.5")
- name: Ink, per jar
  price: "8 gp"
  weight: "½"

- name: Map or scroll case
  price: "1 gp"
  weight: "½"
  description:
    - "A Map or Scroll Case is a tubular oiled leather case used to carry maps, scrolls, or other paper items. The case will have a water-resistant (but not waterproof) cap which slides over the end, and a loop to allow the case to be hung from a belt or bandolier. A standard scroll case can hold up to 10 sheets of paper, or a single scroll of up to seven spells."

# Single-asterisk weight (negligible — counts as 0 for encumbrance)
# Also a good test of the description enhancer, since it needs to find the holy water description in a completely different part of the text
- name: Holy Water, per vial
  price: "10 gp"
  weight: "*"
  description:
    - "Holy water is harmful to undead creatures. A character may throw a flask of holy water as a grenade-like missile, which will break and release the contents if thrown against the body of a corporeal creature. To use it against an incorporeal creature it must be opened and poured or splashed onto the target, generally requiring the attacker to be directly adjacent to it."
    - "Each flask of holy water can inflict 1d8 points of damage to such a monster. In addition, each additional undead monster within 5 feet of the point of impact receives 1d6 points of damage from the splash. Holy water is only effective for one round."

- name: Oil (per flask)
  price: "1 gp"
  weight: "1"
  description:
    - "A flask of oil can be used as a grenade-like missile. The oil must be set afire in order to inflict damage; otherwise the oil is just slippery. Assuming some means of igniting the oil is at hand, a direct hit to a creature deals 1d8 points of fire damage, plus in the next round the target takes an additional 1d8 points of damage, unless they spend the round extinguishing the flames by some reasonable means. The GM must judge the method used; rolling on the floor (assuming it's not oily also) or covering the flames with a wet blanket are good methods, for instance, while pouring or splashing water on burning oil does little good. In any event, a flask of burning oil only causes damage for two rounds at most."
    - "If the oil is ignited by some sort of wick or fuse, then all other creatures within 5 feet of the point of impact receive 1d6 points of fire damage from the splash. A save vs. Death Ray is allowed to avoid this damage. If the flask does not hit the intended target (as described under Grenade-Like Missiles, above), then that creature may still take damage from the splash, and receives a saving throw. No saving throw is allowed for a creature which has received a direct hit."
    - "A flask of oil spilled or splattered on the ground will burn for 10 rounds. Those attempting to cross the burning oil will receive 1d6 points of fire damage each round they are in it (with no saving throw in this case)."
    - "Fire-resistant creatures, including creatures having fire- based abilities, are not damaged by burning oil."

- name: Mirror, small metal
  price: "7 gp"
  weight: "*"

# Double-asterisk weight (very light — multiple items count as 1)
- name: Paper (per sheet)
  price: "1 gp"
  weight: "**"

- name: Whistle
  price: "1 gp"
  weight: "**"

# The three lanterns are a good test. While they have separate table entries, they have descriptive text embedded in a single paragraph.
- name: Lantern
  price: "5 gp"
  weight: "2"
  description:
    - "A Lantern will provide light covering a 30' radius; dim light will extend about 20' further. A lantern will consume a flask of oil in 18+1d6 turns."

- name: Lantern, Bullseye
  price: "14 gp"
  weight: "3"
  description:
    - "A Bullseye Lantern projects a cone of light 30' long and 30' wide at the widest point, with dim light extending an additional 20' beyond that point. This type of lantern is generally hooded."

- name: Lantern, Hooded
  price: "8 gp"
  weight: "2"
  description:
    - "A Hooded Lantern allows the light to be hidden or revealed as the user pleases; in all other ways it performs as an ordinary lantern."

# Tinderbox, flint and steel are a single item. It's a good test because the description contains two bolded terms, "Tinderbox" and "flint and steel", which might trip the implementation
- name: Tinderbox, flint and steel
  price: "3 gp"
  weight: "1"
  description:
    - "A Tinderbox is generally purchased with a flint and steel; the flint, a piece of hard rock, is struck vigorously against a C-shaped piece of high-carbon steel. When done correctly, hot sparks will fly from the flint and steel into the tinder, hopefully starting a fire. The best tinder is a dried piece of prepared tinder fungus, carried in the tinderbox to keep it dry; char cloth, hemp rope, or even very dry grass can substitute if prepared tinder fungus is not available. The time required to start a fire should be determined by the GM according to the prevailing conditions; under ideal conditions, starting a fire with a flint, steel and tinder takes about a turn."

- name: Quiver or Bolt case
  price: "1 gp"
  weight: "1"
  description:
    - "A Quiver is an open container used to hold arrows. A Bolt Case is a similar sort of container for crossbow bolts. In either case, the standard capacity is 20 missiles. The length of a quiver or bolt case must match the length of the ammunition for it to be useful; therefore, there are longbow and shortbow quivers and light and heavy crossbow bolt cases. The price is the same for all types."
