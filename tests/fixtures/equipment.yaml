# The three lanterns are a good test. While they have separate table entries, they have descriptive text embedded in a single paragraph.
- name: Lantern
  price: "5 gp"
  weight: "2"
  description: "A Lantern will provide light covering a 30' radius; dim light will extend about 20' further. A lantern will consume a flask of oil in 18+1d6 turns."

- name: Lantern, Bullseye
  price: "14 gp"
  weight: "3"
  description: "A Bullseye Lantern projects a cone of light 30' long and 30' wide at the widest point, with dim light extending an additional 20' beyond that point. This type of lantern is generally hooded."

- name: Lantern, Hooded
  price: "8 gp"
  weight: "2"
  description: "A Hooded Lantern allows the light to be hidden or revealed as the user pleases; in all other ways it performs as an ordinary lantern."

# Tinderbox, flint and steel are a single item. It's a good test because the description contains two bolded terms, "Tinderbox" and "flint and steel", which might trip the implementation
- name: Tinderbox, flint and steel
  price: "3 gp"
  weight: "1"
  description: "A Tinderbox is generally purchased with a flint and steel; the flint, a piece of hard rock, is struck vigorously against a C-shaped piece of high-carbon steel. When done correctly, hot sparks will fly from the flint and steel into the tinder, hopefully starting a fire.  The best tinder is a dried piece of prepared tinder fungus, carried in the tinderbox to keep it dry; char cloth, hemp rope, or even very dry grass can substitute if prepared tinder fungus is not available.  The time required to start a fire should be determined by the GM according to the prevailing conditions; under ideal conditions, starting a fire with a flint, steel and tinder takes about a turn."
