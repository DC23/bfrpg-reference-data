- name: Camel
  stats:
    armor_class: "13"
    hit_dice: "2"
    no_of_attacks: "1 bite, 1 hoof"
    damage: "1 point bite, 1d4 hoof"
    movement: "50' (10') [ 40' (10') ]"
    no_appearing: "Wild 2d4"
    save_as: "Fighter: 2"
    morale: "7"
    xp: "75"
  description:
    - 'Camels are large animals found in arid environments that bear distinctive fatty deposits known as "humps" on their backs. There are two relevant species of camel described here: the far more common one-humped dromedary, and the two-humped Bactrian camel.  Statistics presented above are for the dromedary; the Bactrian camel is slower and its movement is given in brackets. A light load for a camel is up to 400 pounds; a heavy load, up to 800 pounds.'

- name: Ape, Carnivorous
  stats:
    armor_class: "14"
    hit_dice: "4"
    no_of_attacks: "2 claws"
    damage: "1d4 claw"
    movement: "40'"
    no_appearing: "1d6, Wild 2d4, Lair 2d4"
    save_as: "Fighter: 4"
    morale: "7"
    xp: "240"
    treasure_type: "None"
  description:
    - "Carnivorous apes appear much like ordinary gorillas, but are bad-tempered and aggressive. They are actually omnivores, but have a marked preference for meat. Adult females are 4½ to 5 feet tall and weigh up to 300 pounds, while males are larger, being 5½ to 6 feet tall and weighing up to 400 pounds."
